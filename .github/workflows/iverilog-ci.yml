name: Icarus Verilog CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke_regression:
    name: Icarus-compatible AXI burst-read regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository revision
        run: |
          git rev-parse HEAD
          find rtl sim -maxdepth 4 -type f | sort

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
          iverilog -V
          vvp -V

      - name: Check simulation scripts and filelists
        run: |
          bash -n sim/scripts/run_iverilog.sh
          test -f sim/filelist/rtl.f
          test -f sim/filelist/tb.f

      - name: Run AXI burst-read regression
        working-directory: sim
        run: make iverilog

      - name: Print compile log
        if: always()
        run: |
          if [ -f sim/build_iverilog/compile.log ]; then
            cat sim/build_iverilog/compile.log
          fi

      - name: Print simulation log
        if: always()
        run: |
          if [ -f sim/build_iverilog/sim.log ]; then
            cat sim/build_iverilog/sim.log
          fi

      - name: Upload simulation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iverilog-smoke-logs-${{ github.run_id }}
          path: |
            sim/build_iverilog/compile.log
            sim/build_iverilog/sim.log
          if-no-files-found: warn
          retention-days: 14

      - name: Maintain Icarus CI failure issue
        if: always() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        env:
          CI_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = '[Icarus CI] active failure';
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === issueTitle);

            if (process.env.CI_STATUS === 'success') {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
              return;
            }

            const tail = path => fs.existsSync(path) ? fs.readFileSync(path, 'utf8').slice(-12000) : '(log file not generated)';
            const body = [
              'Status: **failure**',
              `Commit: ${process.env.COMMIT_SHA}`,
              `Run: ${process.env.RUN_URL}`,
              '', '## Compile log', '```text', tail('sim/build_iverilog/compile.log'), '```',
              '', '## Simulation log', '```text', tail('sim/build_iverilog/sim.log'), '```'
            ].join('\n');

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body
              });
            }

  production_rtl_compile:
    name: Production RTL compile gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Compile production RTL
        working-directory: sim
        run: |
          rm -rf build_production
          mkdir -p build_production
          cd build_production
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit \
            -s ddr4_controller_top \
            -o production_elab \
            -f ../filelist/rtl_production.f \
            2>&1 | tee compile_production.log

      - name: Print production compile log
        if: always()
        run: |
          if [ -f sim/build_production/compile_production.log ]; then
            cat sim/build_production/compile_production.log
          fi

      - name: Upload production compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iverilog-production-compile-${{ github.run_id }}
          path: sim/build_production/compile_production.log
          if-no-files-found: warn
          retention-days: 14
