name: M7-M10 DDR4 Closure Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  closure:
    name: M7-M10 timing scheduler PHY closure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Compile closure regression
        working-directory: sim
        run: |
          rm -rf build_m10
          mkdir -p build_m10
          cd build_m10
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m10 -o m10_tb -f ../filelist/m10_tb.f 2>&1 | tee compile.log
      - name: Run closure regression
        working-directory: sim/build_m10
        run: |
          set -o pipefail
          vvp m10_tb 2>&1 | tee sim.log
          grep -q "PASS M7 DDR4 timing and refresh" sim.log
          grep -q "PASS M8 bank-aware scheduler" sim.log
          grep -q "PASS M9 PHY training" sim.log
          grep -q "PASS M10 verification closure" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m10/compile.log || cat sim/build_m10/compile.log
          test ! -f sim/build_m10/sim.log || cat sim/build_m10/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m7-m10-closure-${{ github.run_id }}
          path: |
            sim/build_m10/compile.log
            sim/build_m10/sim.log
          if-no-files-found: warn
          retention-days: 14
      - name: Maintain M10 CI failure issue
        if: always() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        env:
          CI_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = '[M10 Closure CI] active failure';
            const {data: issues} = await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,state:'open',per_page:100});
            const existing = issues.find(issue => !issue.pull_request && issue.title === issueTitle);
            if (process.env.CI_STATUS === 'success') {
              if (existing) await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:existing.number,state:'closed',state_reason:'completed'});
              return;
            }
            const tail = p => fs.existsSync(p) ? fs.readFileSync(p,'utf8').slice(-12000) : '(not generated)';
            const body = ['Status: **failure**',`Commit: ${process.env.COMMIT_SHA}`,`Run: ${process.env.RUN_URL}`,'','## Compile log','```text',tail('sim/build_m10/compile.log'),'```','','## Simulation log','```text',tail('sim/build_m10/sim.log'),'```'].join('\n');
            if (existing) await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:existing.number,body});
            else await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title:issueTitle,body});
