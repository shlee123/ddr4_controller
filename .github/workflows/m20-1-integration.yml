name: M20.1 Top Integration Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m20_1_integration:
    name: M20.1 production top integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Compile integration regression
        working-directory: sim
        run: |
          rm -rf build_m20_1
          mkdir -p build_m20_1
          cd build_m20_1
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m20_1 -o m20_1_tb -f ../filelist/m20_1_tb.f 2>&1 | tee compile.log
      - name: Run integration regression
        working-directory: sim/build_m20_1
        run: |
          set -o pipefail
          vvp m20_1_tb 2>&1 | tee sim.log
          grep -q "PASS M20.1 top-level production integration" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m20_1/compile.log || cat sim/build_m20_1/compile.log
          test ! -f sim/build_m20_1/sim.log || cat sim/build_m20_1/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m20-1-integration-${{ github.run_id }}
          path: |
            sim/build_m20_1/compile.log
            sim/build_m20_1/sim.log
          if-no-files-found: warn
          retention-days: 14
