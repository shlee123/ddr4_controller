name: M20.2 Native Datapath Regression

on:
  push:
    branches: [ main, 'agent/**' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m20_2_native_datapath:
    name: M20.2 native request datapath closure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Compile native datapath regression
        working-directory: sim
        run: |
          rm -rf build_m20_2
          mkdir -p build_m20_2
          cd build_m20_2
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m20_2 -o simv_m20_2 -f ../filelist/m20_2_tb.f 2>&1 | tee compile_m20_2.log
      - name: Run native datapath regression
        working-directory: sim/build_m20_2
        run: |
          set -o pipefail
          vvp simv_m20_2 2>&1 | tee sim_m20_2.log
      - name: Check closure signatures
        working-directory: sim/build_m20_2
        run: |
          grep -q 'PASS M20.2 native FIFO-to-scheduler datapath' sim_m20_2.log
          grep -q 'PASS M20.2 FR-FCFS request selection' sim_m20_2.log
          grep -q 'PASS M20.2 extended timing admission guard' sim_m20_2.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m20_2/compile_m20_2.log || cat sim/build_m20_2/compile_m20_2.log
          test ! -f sim/build_m20_2/sim_m20_2.log || cat sim/build_m20_2/sim_m20_2.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m20-2-native-datapath-${{ github.run_id }}
          path: |
            sim/build_m20_2/compile_m20_2.log
            sim/build_m20_2/sim_m20_2.log
          if-no-files-found: warn
          retention-days: 14
