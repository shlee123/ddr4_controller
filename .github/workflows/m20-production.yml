name: M11-M20 Production Core Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m20_production_core:
    name: M11-M20 production core closure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Compile regression
        working-directory: sim
        run: |
          rm -rf build_m20
          mkdir -p build_m20
          cd build_m20
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m20 -o m20_tb -f ../filelist/m20_tb.f 2>&1 | tee compile.log
      - name: Run regression
        working-directory: sim/build_m20
        run: |
          set -o pipefail
          vvp m20_tb 2>&1 | tee sim.log
          for m in $(seq 11 20); do grep -q "PASS M${m}" sim.log; done
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m20/compile.log || cat sim/build_m20/compile.log
          test ! -f sim/build_m20/sim.log || cat sim/build_m20/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m11-m20-production-${{ github.run_id }}
          path: |
            sim/build_m20/compile.log
            sim/build_m20/sim.log
          if-no-files-found: warn
          retention-days: 14
