name: M20.3 Default Top Cutover Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m20_3_default_top:
    name: M20.3 native default top closure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Verify native cutover source
        run: |
          grep -q "u_native_request_mux" rtl/ddr4_controller_top.sv
          grep -q "wr_req_data(wr_req_native)" rtl/ddr4_controller_top.sv
          grep -q "rd_req_data(rd_req_native)" rtl/ddr4_controller_top.sv
      - name: Compile full AXI to DDR regression
        working-directory: sim
        run: |
          rm -rf build_m20_3
          mkdir -p build_m20_3
          cd build_m20_3
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m4 -o m20_3_tb -f ../filelist/m4_tb.f 2>&1 | tee compile.log
      - name: Run full AXI to DDR regression
        working-directory: sim/build_m20_3
        run: |
          set -o pipefail
          vvp m20_3_tb 2>&1 | tee sim.log
          grep -q "PASS M4 AXI single read/write scoreboard" sim.log
          echo "PASS M20.3 default top native datapath cutover"
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m20_3/compile.log || cat sim/build_m20_3/compile.log
          test ! -f sim/build_m20_3/sim.log || cat sim/build_m20_3/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m20-3-default-top-${{ github.run_id }}
          path: |
            sim/build_m20_3/compile.log
            sim/build_m20_3/sim.log
          if-no-files-found: warn
          retention-days: 14
