name: M21 AXI Transaction Layer Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m21_axi_transaction_layer:
    name: M21 independent AW W AR closure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Verify transaction front-end structure
        run: |
          grep -q "u_aw_fifo" rtl/ddr4_controller_top.sv
          grep -q "u_w_fifo" rtl/ddr4_controller_top.sv
          grep -q "u_ar_fifo" rtl/ddr4_controller_top.sv
          grep -q "wr_req_wr=!awf_empty&&!wf_empty&&!wr_req_full" rtl/ddr4_controller_top.sv
      - name: Compile M21 full AXI to DDR regression
        working-directory: sim
        run: |
          rm -rf build_m21
          mkdir -p build_m21
          cd build_m21
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m4 -o m21_tb -f ../filelist/m4_tb.f 2>&1 | tee compile.log
      - name: Run M21 regression
        working-directory: sim/build_m21
        run: |
          set -o pipefail
          vvp m21_tb 2>&1 | tee sim.log
          grep -q "PASS M21 independent AW/W transaction assembly" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m21/compile.log || cat sim/build_m21/compile.log
          test ! -f sim/build_m21/sim.log || cat sim/build_m21/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m21-axi-transaction-layer-${{ github.run_id }}
          path: |
            sim/build_m21/compile.log
            sim/build_m21/sim.log
          if-no-files-found: warn
          retention-days: 14
