name: M22 AXI ID Ordering Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m22_axi_id:
    name: M22 6-bit AXI ID ordering
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Verify ID interface
        run: |
          grep -q "parameter int AXI_ID_W=6" rtl/ddr4_controller_top.sv
          grep -q "s_axi_awid" rtl/ddr4_controller_top.sv
          grep -q "s_axi_arid" rtl/ddr4_controller_top.sv
          grep -q "s_axi_bid" rtl/ddr4_controller_top.sv
          grep -q "s_axi_rid" rtl/ddr4_controller_top.sv
      - name: Compile M22 regression
        working-directory: sim
        run: |
          rm -rf build_m22
          mkdir -p build_m22
          cd build_m22
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m22 -o m22_tb -f ../filelist/m22_tb.f 2>&1 | tee compile.log
      - name: Run M22 regression
        working-directory: sim/build_m22
        run: |
          set -o pipefail
          vvp m22_tb 2>&1 | tee sim.log
          grep -q "PASS M22 AXI 6-bit ID echo and per-ID ordering" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m22/compile.log || cat sim/build_m22/compile.log
          test ! -f sim/build_m22/sim.log || cat sim/build_m22/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m22-axi-id-${{ github.run_id }}
          path: |
            sim/build_m22/compile.log
            sim/build_m22/sim.log
          if-no-files-found: warn
          retention-days: 14
