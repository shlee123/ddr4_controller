name: M23-M28 Transaction and Refresh Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m23_m28:
    name: M23-M28 transaction architecture closure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Verify production source inclusion
        run: |
          grep -q "ddr4_m23_m28_engine.sv" sim/filelist/rtl_production.f
          grep -q "OUTSTANDING=16" rtl/core/ddr4_m23_m28_engine.sv
          grep -q "CMD_DEPTH=16" rtl/core/ddr4_m23_m28_engine.sv
          grep -q "T_REFI" rtl/core/ddr4_m23_m28_engine.sv
          grep -q "T_RFC" rtl/core/ddr4_m23_m28_engine.sv
      - name: Compile M23-M28 regression
        working-directory: sim
        run: |
          rm -rf build_m23_m28
          mkdir -p build_m23_m28
          cd build_m23_m28
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m23_m28 -o m23_m28_tb -f ../filelist/m23_m28_tb.f 2>&1 | tee compile.log
      - name: Run M23-M28 regression
        working-directory: sim/build_m23_m28
        run: |
          set -o pipefail
          vvp m23_m28_tb 2>&1 | tee sim.log
          grep -q "PASS M23 outstanding transaction table" sim.log
          grep -q "PASS M24 read reorder buffer" sim.log
          grep -q "PASS M25 independent B and R response queues" sim.log
          grep -q "PASS M26 complete burst beat expansion" sim.log
          grep -q "PASS M27 multi-entry bank command scheduler" sim.log
          grep -q "PASS M28 production refresh deadline and tRFC control" sim.log
          grep -q "PASS M23-M28 transaction architecture closure" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m23_m28/compile.log || cat sim/build_m23_m28/compile.log
          test ! -f sim/build_m23_m28/sim.log || cat sim/build_m23_m28/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m23-m28-${{ github.run_id }}
          path: |
            sim/build_m23_m28/compile.log
            sim/build_m23_m28/sim.log
          if-no-files-found: warn
          retention-days: 14
