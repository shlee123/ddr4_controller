name: M29 AXI Transaction Integration

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m29:
    name: M29 AXI to native transaction integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Verify production source inclusion
        run: |
          grep -q "ddr4_m29_axi_transaction_engine.sv" sim/filelist/rtl_production.f
          grep -q "ddr4_m23_m28_engine" rtl/core/ddr4_m29_axi_transaction_engine.sv
          grep -q "OUTSTANDING=16" rtl/core/ddr4_m29_axi_transaction_engine.sv
          grep -q "AXI front-end" rtl/core/ddr4_m29_axi_transaction_engine.sv
      - name: Compile M29 regression
        working-directory: sim
        run: |
          rm -rf build_m29
          mkdir -p build_m29
          cd build_m29
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m29 -o m29_tb -f ../filelist/m29_tb.f 2>&1 | tee compile.log
      - name: Run M29 regression
        working-directory: sim/build_m29
        run: |
          set -o pipefail
          vvp m29_tb 2>&1 | tee sim.log
          grep -q "PASS M29 AXI front-end integrated with M23-M28 transaction engine" sim.log
          grep -q "PASS M29 multiple outstanding AXI IDs and ordered responses" sim.log
          grep -q "PASS M29 AW/W assembly, native commands, completion and refresh paths" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m29/compile.log || cat sim/build_m29/compile.log
          test ! -f sim/build_m29/sim.log || cat sim/build_m29/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m29-${{ github.run_id }}
          path: |
            sim/build_m29/compile.log
            sim/build_m29/sim.log
          if-no-files-found: warn
          retention-days: 14
