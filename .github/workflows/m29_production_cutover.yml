name: M29 Production Engine Cutover Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m29_cutover:
    name: M29 M22 plus M23-M28 production integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Verify default top cutover
        run: |
          grep -q "ddr4_m29_native_bridge" rtl/ddr4_controller_top.sv
          grep -q "u_m29_bridge" rtl/ddr4_controller_top.sv
          grep -q "wr_req_data(sched_wr_req)" rtl/ddr4_controller_top.sv
          grep -q "rd_req_data(sched_rd_req)" rtl/ddr4_controller_top.sv
          grep -q "ddr4_m29_native_bridge.sv" sim/filelist/rtl_production.f
          ! grep -q "u_native_request_mux" rtl/ddr4_controller_top.sv
          ! grep -q "u_rsp_id_fifo" rtl/ddr4_controller_top.sv
      - name: Compile integrated production hierarchy
        working-directory: sim
        run: |
          rm -rf build_m29
          mkdir -p build_m29
          cd build_m29
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m22 -o m29_tb -f ../filelist/m22_tb.f 2>&1 | tee compile.log
      - name: Run integrated AXI ID regression
        working-directory: sim/build_m29
        run: |
          set -o pipefail
          vvp m29_tb 2>&1 | tee sim.log
          grep -q "PASS M22 AXI 6-bit ID echo and per-ID ordering" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m29/compile.log || cat sim/build_m29/compile.log
          test ! -f sim/build_m29/sim.log || cat sim/build_m29/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m29-cutover-${{ github.run_id }}
          path: |
            sim/build_m29/compile.log
            sim/build_m29/sim.log
          if-no-files-found: warn
          retention-days: 14
