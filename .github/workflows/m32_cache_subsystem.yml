name: M30-M32 Cache Subsystem

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m32:
    name: M30-M32 write buffer and victim cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Verify architecture defaults
        run: |
          grep -q "WRITE_BUFFER_DEPTH = 32" rtl/pkg/ddr4_ctrl_pkg.sv
          grep -q "VICTIM_CACHE_LINES = 16" rtl/pkg/ddr4_ctrl_pkg.sv
          grep -q "parameter integer DEPTH=32" rtl/core/ddr4_m30_write_buffer.sv
          grep -q "parameter integer LINES=16" rtl/core/ddr4_m31_victim_cache.sv
          grep -q "ddr4_m32_cache_subsystem.sv" sim/filelist/rtl_production.f
      - name: Compile M30-M32 regression
        working-directory: sim
        run: |
          rm -rf build_m32
          mkdir -p build_m32
          cd build_m32
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit -s tb_ddr4_controller_m32 -o m32_tb -f ../filelist/m32_tb.f 2>&1 | tee compile.log
      - name: Run M30-M32 regression
        working-directory: sim/build_m32
        run: |
          set -o pipefail
          vvp m32_tb 2>&1 | tee sim.log
          grep -q "PASS M30-M32 write_buffer=32 victim_lines=16" sim.log
      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_m32/compile.log || cat sim/build_m32/compile.log
          test ! -f sim/build_m32/sim.log || cat sim/build_m32/sim.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m32-${{ github.run_id }}
          path: |
            sim/build_m32/compile.log
            sim/build_m32/sim.log
          if-no-files-found: warn
          retention-days: 14
