name: Production Functional Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  production_functional_regression:
    name: Production DDR4 initialization regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Compile production testbench
        working-directory: sim
        run: |
          rm -rf build_production_tb
          mkdir -p build_production_tb
          cd build_production_tb
          set -o pipefail
          iverilog -g2012 -Wall -Wimplicit \
            -s tb_ddr4_controller_production \
            -o production_tb \
            -f ../filelist/production_tb.f \
            2>&1 | tee compile.log

      - name: Run production initialization regression
        working-directory: sim/build_production_tb
        run: |
          set -o pipefail
          vvp production_tb 2>&1 | tee sim.log
          grep -q "PASS production initialization" sim.log

      - name: Print logs
        if: always()
        run: |
          test ! -f sim/build_production_tb/compile.log || cat sim/build_production_tb/compile.log
          test ! -f sim/build_production_tb/sim.log || cat sim/build_production_tb/sim.log

      - name: Upload production functional logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-functional-${{ github.run_id }}
          path: |
            sim/build_production_tb/compile.log
            sim/build_production_tb/sim.log
          if-no-files-found: warn
          retention-days: 14

      - name: Maintain production CI failure issue
        if: always() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        env:
          CI_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const issueTitle = '[Production Functional CI] active failure';
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === issueTitle);

            if (process.env.CI_STATUS === 'success') {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
              return;
            }

            const read = path => fs.existsSync(path) ? fs.readFileSync(path, 'utf8').slice(-12000) : '(not generated)';
            const body = [
              'Status: **failure**',
              `Commit: ${process.env.COMMIT_SHA}`,
              `Run: ${process.env.RUN_URL}`,
              '', '## Compile log', '```text', read('sim/build_production_tb/compile.log'), '```',
              '', '## Simulation log', '```text', read('sim/build_production_tb/sim.log'), '```'
            ].join('\n');

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body
              });
            }
